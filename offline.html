<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Portfolio</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0a0e1a;color:#e3f2fd;font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
      padding:24px;text-align:center}
    .icon{font-size:64px;margin-bottom:20px}
    h1{font-size:22px;font-weight:700;margin-bottom:10px;color:#4fc3f7}
    p{font-size:14px;color:#90caf9;line-height:1.6;max-width:300px;margin-bottom:28px}
    button{background:#4fc3f7;color:#0a0e1a;border:none;border-radius:24px;
      padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer}
    button:active{opacity:0.8}
  </style>
</head>
<body>
  <div class="icon">💼</div>
  <h1>You're offline</h1>
  <p>The portfolio needs a connection to load. Check your internet and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
